<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 590" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="590" fill="#ffffff"/>

  <text x="40" y="36" font-size="22" fill="#1e1e1e" font-weight="600">Isolated security lab (concept)</text>
  <text x="40" y="60" font-size="13" fill="#495057">Planning phase. Trust drops top to bottom; two controlled crossings through the firewall.</text>

  <!-- WAN -->
  <rect x="375" y="84" width="150" height="42" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.5"/>
  <g transform="translate(390,94)" stroke="#868e96" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="9.5"/><line x1="1.5" y1="11" x2="20.5" y2="11"/><ellipse cx="11" cy="11" rx="4.3" ry="9.5"/>
  </g>
  <text x="465" y="110" font-size="14" fill="#1e1e1e" text-anchor="middle">Internet / WAN</text>
  <line x1="450" y1="126" x2="450" y2="148" stroke="#868e96" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Gateway -->
  <rect x="320" y="150" width="260" height="56" rx="10" fill="#fff4e0" stroke="#f08c00" stroke-width="2"/>
  <g transform="translate(335,163)" stroke="#e8590c" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2 L20 5.5 V11.5 C20 17 12 21.5 12 21.5 C12 21.5 4 17 4 11.5 V5.5 Z"/>
    <path d="M8.5 11.5 l2.4 2.4 L16 9"/>
  </g>
  <text x="376" y="175" font-size="15" fill="#1e1e1e">UniFi Gateway</text>
  <text x="376" y="194" font-size="11" fill="#495057">firewall + VLAN enforcement</text>
  <line x1="450" y1="206" x2="450" y2="230" stroke="#f08c00" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Trusted zone -->
  <rect x="40" y="232" width="820" height="126" rx="12" fill="#eef4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="56" y="254" font-size="14" fill="#1c7ed6" font-weight="600">Trusted / MGMT VLAN</text>

  <g>
    <rect x="56" y="266" width="185" height="74" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(64,273)" stroke="#1c7ed6" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><circle cx="5" cy="6.5" r="0.9"/><circle cx="8" cy="6.5" r="0.9"/>
    </g>
    <text x="148" y="301" font-size="14" fill="#1e1e1e" text-anchor="middle">Kasm portal</text>
    <text x="148" y="321" font-size="11" fill="#495057" text-anchor="middle">the doorway</text>
  </g>
  <g>
    <rect x="257" y="266" width="185" height="74" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(265,273)" stroke="#1c7ed6" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="6.5" rx="1.2"/><rect x="3" y="13.5" width="18" height="6.5" rx="1.2"/><circle cx="6.5" cy="7.2" r="1"/><circle cx="6.5" cy="16.7" r="1"/>
    </g>
    <text x="349" y="301" font-size="14" fill="#1e1e1e" text-anchor="middle">Proxmox + UniFi</text>
    <text x="349" y="321" font-size="11" fill="#495057" text-anchor="middle">management</text>
  </g>
  <g>
    <rect x="458" y="266" width="185" height="74" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(466,273)" stroke="#1c7ed6" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="10.5" width="14" height="10.5" rx="2"/><path d="M8 10.5 V8 a4 4 0 0 1 8 0 V10.5"/><circle cx="12" cy="15.3" r="1.3"/><line x1="12" y1="16.6" x2="12" y2="18.2"/>
    </g>
    <text x="550" y="301" font-size="14" fill="#1e1e1e" text-anchor="middle">NPM + Netbird/WG</text>
    <text x="550" y="321" font-size="11" fill="#495057" text-anchor="middle">proxy + VPN in</text>
  </g>
  <g>
    <rect x="659" y="266" width="185" height="74" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(667,273)" stroke="#1c7ed6" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="12" rx="1.5"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="16" x2="12" y2="20"/>
    </g>
    <text x="751" y="301" font-size="14" fill="#1e1e1e" text-anchor="middle">Your workstation</text>
    <text x="751" y="321" font-size="11" fill="#495057" text-anchor="middle">browser only</text>
  </g>

  <!-- Firewall bar -->
  <rect x="40" y="372" width="820" height="44" rx="10" fill="#fff4e0" stroke="#f08c00" stroke-width="1.5"/>
  <g transform="translate(52,380)" stroke="#e8590c" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="16" rx="1.5"/><line x1="2" y1="7.3" x2="22" y2="7.3"/><line x1="2" y1="12.6" x2="22" y2="12.6"/><line x1="9" y1="2" x2="9" y2="7.3"/><line x1="15" y1="7.3" x2="15" y2="12.6"/><line x1="9" y1="12.6" x2="9" y2="18"/>
  </g>
  <text x="466" y="399" font-size="13" fill="#e8590c" text-anchor="middle" font-weight="600">Firewall: default deny between zones. LAB egress = DROP.</text>

  <!-- Lab zone -->
  <rect x="40" y="430" width="820" height="132" rx="12" fill="#fff0f0" stroke="#e03131" stroke-width="1"/>
  <text x="56" y="452" font-size="14" fill="#e03131" font-weight="600">Lab / Quarantine VLAN (no internet)</text>

  <g>
    <rect x="56" y="464" width="185" height="76" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(64,472)" stroke="#e03131" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 9 l4 3 -4 3"/><line x1="12.5" y1="15" x2="18" y2="15"/>
    </g>
    <text x="148" y="500" font-size="14" fill="#1e1e1e" text-anchor="middle">Kali attacker</text>
    <text x="148" y="520" font-size="11" fill="#495057" text-anchor="middle">streamed via Kasm</text>
  </g>
  <g>
    <rect x="257" y="464" width="185" height="76" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(265,472)" stroke="#e03131" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.7" fill="#e03131"/>
    </g>
    <text x="349" y="500" font-size="14" fill="#1e1e1e" text-anchor="middle">Victim VM</text>
    <text x="349" y="520" font-size="11" fill="#495057" text-anchor="middle">snapshot first</text>
  </g>
  <g>
    <rect x="458" y="464" width="185" height="76" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(466,472)" stroke="#e03131" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 17 h9 a4 4 0 0 0 0 -8 5 5 0 0 0 -9.6 -1.5 A3.6 3.6 0 0 0 7 17 Z"/><line x1="4" y1="20" x2="20" y2="5"/>
    </g>
    <text x="550" y="500" font-size="14" fill="#1e1e1e" text-anchor="middle">INetSim</text>
    <text x="550" y="520" font-size="11" fill="#495057" text-anchor="middle">fake internet</text>
  </g>
  <g>
    <rect x="659" y="464" width="185" height="76" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="1.3"/>
    <g transform="translate(667,472)" stroke="#0ca678" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 14 v4 a2 2 0 0 0 2 2 h12 a2 2 0 0 0 2 -2 v-4"/><line x1="12" y1="4" x2="12" y2="13.5"/><path d="M8 9.5 l4 4 4 -4"/>
    </g>
    <text x="751" y="500" font-size="14" fill="#1e1e1e" text-anchor="middle">Transfer host</text>
    <text x="751" y="520" font-size="11" fill="#495057" text-anchor="middle">pull-only</text>
  </g>

  <!-- crossings -->
  <line x1="148" y1="340" x2="148" y2="462" stroke="#2f9e44" stroke-width="2.4" marker-end="url(#ar)"/>
  <text x="52" y="402" font-size="11" fill="#2f9e44">stream in</text>
  <line x1="751" y1="464" x2="751" y2="342" stroke="#0ca678" stroke-width="2.4" stroke-dasharray="7 4" marker-end="url(#ar)"/>
  <text x="848" y="402" font-size="11" fill="#0ca678" text-anchor="end">artifacts out</text>
</svg>
