global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'security-01'
    static_configs:
      - targets: ['192.168.72.2:9100']

  - job_name: 'edge-01'
    static_configs:
      - targets: ['192.168.90.10:9100']

  - job_name: 'grey-server'
    static_configs:
      - targets: ['192.168.70.10:9100']

  - job_name: 'purple-server'
    static_configs:
      - targets: ['192.168.70.11:9100']

  - job_name: 'blue-server'
    static_configs:
      - targets: ['192.168.70.12:9100']

  - job_name: 'red-server'
    static_configs:
      - targets: ['192.168.70.13:9100']

  - job_name: 'proxmox'
    static_configs:
      - targets: ['192.168.70.10']
    metrics_path: /pve
    params:
      module: [default]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: pve-exporter:9221
