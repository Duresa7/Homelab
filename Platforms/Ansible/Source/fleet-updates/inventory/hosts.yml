---
# Fleet update inventory for ansible-01.
#
# Scope is deliberate. The four Proxmox nodes and every Windows host are absent:
# this automation patches Linux guests through apt or dnf, and updates docker
# compose stacks only on the hosts that run them. Add a host here only after its
# controller SSH key is in place and, for compose, after confirming its project
# paths with `docker compose ls`.
#
# The public copy uses placeholder usernames. The copy deployed on ansible-01
# uses the real accounts: dkadi in place of <YOUR_ADMIN_USERNAME> and aibravo in
# place of <YOUR_DEPLOYMENT_USER>.
all:
  children:
    os_update_targets:
      hosts:
        docker-main:
          ansible_host: 192.168.40.35
          ansible_user: root
          os_update_become: false
        docker-network:
          ansible_host: 192.168.85.2
          ansible_user: <YOUR_ADMIN_USERNAME>
        alpha-prod-01:
          ansible_host: 192.168.80.118
          ansible_user: <YOUR_ADMIN_USERNAME>
        app-01:
          ansible_host: 192.168.80.10
          ansible_user: <YOUR_ADMIN_USERNAME>
        supabase-01:
          ansible_host: 192.168.80.20
          ansible_user: <YOUR_ADMIN_USERNAME>
        ai-alpha-01:
          ansible_host: 192.168.40.37
          ansible_user: openclaw
        ai-bravo-02:
          ansible_host: 192.168.40.38
          ansible_user: <YOUR_DEPLOYMENT_USER>
        edge-01:
          ansible_host: 192.168.90.10
          ansible_user: <YOUR_ADMIN_USERNAME>
        security-01:
          ansible_host: 192.168.72.2
          ansible_user: <YOUR_ADMIN_USERNAME>
        splunk-siem:
          ansible_host: 192.168.72.3
          ansible_user: <YOUR_ADMIN_USERNAME>

    # Connection details for these hosts come from os_update_targets above;
    # here I only attach the compose project list each host should keep current.
    # project_name is the running project name from `docker compose ls`, which
    # can differ from the directory (immich runs from /opt/docker/immich-app).
    docker_compose_targets:
      hosts:
        docker-main:
          compose_projects:
            - {name: booklore, project_src: /opt/docker/booklore}
            - {name: forgejo, project_src: /opt/docker/forgejo}
            - {name: homelab-dashboard-aio, project_src: /opt/docker/homelab-dashboard-aio}
            - {name: immich, project_src: /opt/docker/immich-app}
            - {name: portainer, project_src: /opt/docker/portainer}
            - {name: termix, project_src: /opt/docker/termix}
        docker-network:
          compose_projects:
            - {name: netbird, project_src: /opt/docker/netbird}
            - {name: nginx-proxy-manager, project_src: /opt/docker/nginx-proxy-manager}
        alpha-prod-01:
          compose_projects:
            - {name: playit-agent, project_src: /home/<YOUR_ADMIN_USERNAME>/playit-agent}
            - {name: portainer-edge-agent, project_src: /opt/docker/portainer-edge-agent}
            - {name: teamspeak, project_src: /home/<YOUR_ADMIN_USERNAME>/teamspeak}
            - {name: teamspeak-02, project_src: /home/<YOUR_ADMIN_USERNAME>/teamspeak-02}
            - {name: teamspeak-03, project_src: /home/<YOUR_ADMIN_USERNAME>/teamspeak-03}
            - {name: ts3-manager, project_src: /home/<YOUR_ADMIN_USERNAME>/ts3-manager}
