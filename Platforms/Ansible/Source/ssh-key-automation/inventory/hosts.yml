---
all:
  children:
    ssh_key_supported:
      children:
        proxmox_ssh_key_hosts:
          vars:
            ssh_key_platform: posix
            ssh_authorized_keys_path: /etc/pve/priv/authorized_keys
          hosts:
            grey-server:
              ansible_host: 192.168.70.10
              ansible_user: root
              ssh_key_write_enabled: true
            purple-server:
              ansible_host: 192.168.70.11
              ansible_user: root
              ssh_key_write_enabled: false
              ssh_key_shared_writer: grey-server
            blue-server:
              ansible_host: 192.168.70.12
              ansible_user: root
              ssh_key_write_enabled: false
              ssh_key_shared_writer: grey-server
            red-server:
              ansible_host: 192.168.70.13
              ansible_user: root
              ssh_key_write_enabled: false
              ssh_key_shared_writer: grey-server

        linux_ssh_key_hosts:
          vars:
            ssh_key_platform: posix
            ssh_key_write_enabled: true
          hosts:
            docker-main:
              ansible_host: 192.168.40.35
              ansible_user: root
              ssh_authorized_keys_path: /root/.ssh/authorized_keys
            docker-network:
              ansible_host: 192.168.85.2
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            alpha-prod-01:
              ansible_host: 192.168.80.118
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            app-01:
              ansible_host: 192.168.80.10
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            supabase-01:
              ansible_host: 192.168.80.20
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            ai-alpha-01:
              ansible_host: 192.168.40.37
              ansible_user: openclaw
              ssh_authorized_keys_path: /home/openclaw/.ssh/authorized_keys
            ai-bravo-02:
              ansible_host: 192.168.40.38
              ansible_user: REDACTED_DEPLOYMENT_USER
              ssh_authorized_keys_path: /home/REDACTED_DEPLOYMENT_USER/.ssh/authorized_keys
            edge-01:
              ansible_host: 192.168.90.10
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            security-01:
              ansible_host: 192.168.72.2
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys
            splunk-siem:
              ansible_host: 192.168.72.3
              ansible_user: REDACTED_USER_001
              ssh_authorized_keys_path: /home/REDACTED_USER_001/.ssh/authorized_keys

        windows_ssh_key_hosts:
          vars:
            ansible_connection: ssh
            ansible_shell_type: powershell
            ssh_key_platform: windows
            ssh_key_write_enabled: true
          hosts:
            ws-dc-1-main:
              ansible_host: 192.168.65.10
              ansible_user: Administrator
              ssh_authorized_keys_path: 'C:\ProgramData\ssh\administrators_authorized_keys'

    ssh_key_unknown:
      vars:
        ansible_connection: ssh
        ansible_shell_type: powershell
        ssh_key_platform: windows
      hosts:
        ws-dc-2-secondary:
          ansible_host: 192.168.65.45
          ansible_user: Administrator
          ssh_authorized_keys_path: 'C:\ProgramData\ssh\administrators_authorized_keys'
        obi-pc:
          ansible_host: 192.168.65.102
          ansible_user: REDACTED_USER_003
          ssh_authorized_keys_path: 'C:\Users\REDACTED_USER_003\.ssh\authorized_keys'

    termix_current_targets:
      hosts:
        grey-server:
        purple-server:
        blue-server:
        red-server:
        docker-main:
        docker-network:
        alpha-prod-01:
        app-01:
        edge-01:

    termix_candidate_targets:
      hosts:
        supabase-01:
        ai-alpha-01:
        ai-bravo-02:
        ws-dc-1-main:
        security-01:
        splunk-siem:

    # Populated at runtime after identity and allowlist validation.
    ssh_identity_runtime_targets:
      hosts: {}
